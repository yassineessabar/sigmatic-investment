# Advanced Ensemble Statistical Arbitrage Configuration
# Multiple strategy combination for 2+ Sharpe target

pairs:
  - base: BTCUSDT
    alt: AVAXUSDT
    allocation_weight: 1.0
  - base: BTCUSDT
    alt: ADAUSDT
    allocation_weight: 1.0
  - base: BTCUSDT
    alt: ETHUSDT
    allocation_weight: 1.0
  - base: BTCUSDT
    alt: SOLUSDT
    allocation_weight: 1.0
  - base: BTCUSDT
    alt: DOTUSDT
    allocation_weight: 1.0
  - base: BTCUSDT
    alt: LINKUSDT
    allocation_weight: 1.0

strategy:
  type: "ensemble_stat_arb"
  ensemble_mode: true        # Enable ensemble strategy
  ml_enhancement: true       # Enable ML features

  # Ensemble parameters
  ensemble:
    min_strategy_weight: 0.1
    max_strategy_weight: 0.6
    performance_window: 45
    rebalance_frequency: 3
    lookback_period: 90

  # Individual strategy configurations
  mean_reversion:
    formation_period: 1
    holding_period: 1
    long_threshold: 0.15
    short_threshold: 0.85

  volume_momentum:
    formation_period: 7
    holding_period: 1
    signal_lag: 1
    long_threshold: 0.2
    short_threshold: 0.8

  ml_enhanced:
    lookback_period: 60
    rebalance_frequency: 1
    position_sizing_method: "volatility_weighted"

portfolio:
  equal_weight: false
  volatility_scaled: true
  rebalance_frequency: "daily"
  market_neutral: true

risk:
  max_daily_dd: 0.08
  max_total_dd: 0.20
  leverage_limit: 15.0
  max_position_size: 0.4
  dynamic_risk_management: true

  # VaR settings
  var_confidence: 0.05
  daily_var_limit: 0.015
  max_position_concentration: 0.25
  max_sector_concentration: 0.4

execution:
  slippage: 0.00002          # Ultra-low costs for ensemble
  fees: 0.00002
  commission_bps: 0.5        # Assuming market maker rebates

backtest:
  start_date: "2022-11-29"
  end_date: "2025-11-29"
  initial_capital: 10000
  freq: 365
  split_date: "2024-01-01"

futures:
  enabled: true
  include_funding: true
  funding_frequency: 8

logging:
  level: "INFO"
  console: true
  file: "logs/ensemble_stat_arb_trading.log"