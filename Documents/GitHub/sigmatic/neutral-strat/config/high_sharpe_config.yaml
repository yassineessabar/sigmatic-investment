# High Sharpe Ratio Optimized Configuration
# Focused on maximizing risk-adjusted returns with aggressive parameters

# =====================================================
# STRATEGY PARAMETERS (OPTIMIZED FOR HIGH SHARPE)
# =====================================================

# Trading pairs - Optimized allocation weights
pairs:
  - base: BTCUSDT
    alt: AVAXUSDT
    ema_window: 6
    allocation_weight: 0.85  # Increased allocation
    max_notional: 2000       # Higher notional
  - base: BTCUSDT
    alt: ETHUSDT
    ema_window: 9
    allocation_weight: 0.80
    max_notional: 2000
  - base: BTCUSDT
    alt: SOLUSDT
    ema_window: 2
    allocation_weight: 0.90  # Highest for best performer
    max_notional: 2000
  - base: BTCUSDT
    alt: ADAUSDT
    ema_window: 3
    allocation_weight: 0.85
    max_notional: 2000

# Strategy configuration - Aggressive optimization
strategy:
  type: "relative_momentum_futures"
  optimization:
    enabled: true
    window_range_start: 1
    window_range_end: 15        # Shorter range for faster signals
    metric: "sharpe"            # Pure Sharpe optimization
  enhancements:
    enabled: true
    multi_timeframe_confirmation: true
    volatility_position_sizing: true
    rsi_momentum_filter: true
    dynamic_position_sizing: true
    trend_momentum_boost: true
    stop_loss_mechanism: false  # Disabled to reduce transaction costs
    enhanced_cost_calculation: false

# Portfolio settings - Aggressive
portfolio:
  equal_weight: false          # Use optimized weights
  volatility_scaled: true
  rebalance_frequency: "daily"

# Risk management - Higher risk tolerance
risk:
  max_daily_dd: 0.08           # 8% max daily drawdown (increased)
  max_total_dd: 0.15           # 15% max total drawdown (increased)
  leverage_limit: 15.0         # Higher leverage
  max_position_size: 0.3       # 30% max position size
  stop_loss: 0.03              # 3% stop loss

# Futures settings
futures:
  enabled: true
  include_funding: true
  funding_frequency: 8

# Backtest settings
backtest:
  start_date: "2022-01-01"
  end_date: null
  initial_capital: 10000
  freq: 365

# =====================================================
# EXECUTION SETTINGS
# =====================================================

execution:
  # Lower costs for more trading
  slippage: 0.0003             # Reduced slippage assumption
  fees: 0.0003                 # Reduced fees (maker)

  backtest_mode:
    interval: "1d"
    mode: "backtest"

  test_mode:
    interval: "1h"
    mode: "paper"
    check_frequency_minutes: 60
    position_size_multiplier: 0.01
    use_spot_trading: true
    simulate_execution: true

  live_mode:
    interval: "1d"
    mode: "live"
    check_frequency_minutes: 120
    position_size_multiplier: 1.0
    confirmation_required: true

# =====================================================
# ENVIRONMENT SETTINGS
# =====================================================

binance:
  testnet_mode:
    testnet: false
    base_url: "https://api.binance.com"
    api_key: "${BINANCE_TESTNET_API_KEY}"
    api_secret: "${BINANCE_TESTNET_API_SECRET}"
    demo_trading: true

  live_mode:
    testnet: false
    base_url: "https://api.binance.com"
    api_key: "${BINANCE_LIVE_API_KEY}"
    api_secret: "${BINANCE_LIVE_API_SECRET}"

# Logging
logging:
  level: "INFO"
  console: true
  file: "logs/high_sharpe_trading.log"

# Monitoring
monitoring:
  status_interval: 600
  daily_reports: true
  performance_tracking: true